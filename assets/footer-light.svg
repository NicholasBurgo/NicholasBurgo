<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="60" viewBox="0 0 1200 60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDEAE6"/>
      <stop offset="100%" stop-color="#F5F3F0"/>
    </linearGradient>
    <radialGradient id="n1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 0.35; } }
    .s1 { animation: twinkle 4s ease-in-out infinite; }
  </style>

  <rect width="1200" height="60" fill="url(#bg)"/>
  <rect width="1200" height="60" fill="url(#n1)"/>

  <circle cx="120" cy="15" r="0.9" fill="#5C6380" class="s1" style="animation-delay:-1.5s"/>
  <circle cx="580" cy="48" r="0.7" fill="#5C6380" class="s1" style="animation-delay:-3.2s"/>
  <circle cx="1050" cy="22" r="1.0" fill="#5C6380" class="s1" style="animation-delay:-0.8s"/>

  <text x="600" y="38" text-anchor="middle" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="13" fill="#5C6380">southeastern Louisiana</text>
</svg>
