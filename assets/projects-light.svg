<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDEAE6"/>
      <stop offset="100%" stop-color="#F5F3F0"/>
    </linearGradient>
    <radialGradient id="n1" cx="60%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n2" cx="25%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#4A7BF7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#4A7BF7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n3" cx="85%" cy="80%" r="25%">
      <stop offset="0%" stop-color="#9B4FDE" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#9B4FDE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#n1)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="10s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="340" fill="url(#n2)">
    <animate attributeName="opacity" values="1;0.8;1" dur="8s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="340" fill="url(#n3)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="12s" begin="5s" repeatCount="indefinite"/>
  </rect>

  <circle cx="78" cy="30" r="0.7" fill="#5C6380"><animate attributeName="opacity" values="0.05;0.25;0.05" dur="4s" begin="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="340" cy="310" r="0.9" fill="#5C6380"><animate attributeName="opacity" values="0.05;0.22;0.05" dur="5s" begin="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="15" r="0.6" fill="#5C6380"><animate attributeName="opacity" values="0.04;0.2;0.04" dur="6s" begin="0.7s" repeatCount="indefinite"/></circle>
  <circle cx="980" cy="280" r="0.8" fill="#5C6380"><animate attributeName="opacity" values="0.05;0.22;0.05" dur="7s" begin="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="1130" cy="60" r="0.5" fill="#5C6380"><animate attributeName="opacity" values="0.05;0.25;0.05" dur="4s" begin="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="170" r="0.7" fill="#5C6380"><animate attributeName="opacity" values="0.04;0.28;0.04" dur="5s" begin="5.6s" repeatCount="indefinite"/></circle>
  <circle cx="1080" cy="190" r="0.6" fill="#5C6380"><animate attributeName="opacity" values="0.05;0.22;0.05" dur="6s" begin="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="325" r="0.8" fill="#5C6380"><animate attributeName="opacity" values="0.05;0.25;0.05" dur="4s" begin="3.7s" repeatCount="indefinite"/></circle>

  <text x="80" y="45" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#1A1D2B" letter-spacing="1">Projects</text>

  <text x="80" y="90" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1A1D2B">SiteInsite</text>
  <text x="80" y="112" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#4A4E5C">Full-stack intelligence platform that crawls websites and generates SEO,</text>
  <text x="80" y="130" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#4A4E5C">performance, and competitor insight reports.</text>
  <text x="80" y="150" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#5C6380">Python  ·  FastAPI  ·  React  ·  aiohttp  ·  Playwright</text>

  <text x="80" y="195" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1A1D2B">SiteExtractor</text>
  <text x="80" y="217" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#4A4E5C">Extract, deduplicate, and export web content with real-time progress</text>
  <text x="80" y="235" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#4A4E5C">tracking and multi-format support.</text>
  <text x="80" y="255" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#5C6380">Python  ·  FastAPI  ·  React  ·  SimHash</text>

  <text x="80" y="300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1A1D2B">AI Ops Playbook</text>
  <text x="80" y="322" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#4A4E5C">Version-controlled library of production-grade AI prompts, workflows, and operational standards.</text>
</svg>
