<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="180" viewBox="0 0 1200 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1019"/>
      <stop offset="100%" stop-color="#151929"/>
    </linearGradient>
    <radialGradient id="n1" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#4A7BF7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4A7BF7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="180" fill="url(#bg)"/>
  <rect width="1200" height="180" fill="url(#n1)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="9s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="180" fill="url(#n2)">
    <animate attributeName="opacity" values="1;0.85;1" dur="11s" begin="3s" repeatCount="indefinite"/>
  </rect>

  <circle cx="45" cy="25" r="0.8" fill="#E0E6F1"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" begin="0.5s" repeatCount="indefinite"/></circle>
  <circle cx="312" cy="155" r="0.6" fill="#E0E6F1"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="4s" begin="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="20" r="0.9" fill="#E0E6F1"><animate attributeName="opacity" values="0.1;0.75;0.1" dur="6s" begin="1.3s" repeatCount="indefinite"/></circle>
  <circle cx="1050" cy="140" r="0.7" fill="#E0E6F1"><animate attributeName="opacity" values="0.2;0.65;0.2" dur="7s" begin="4.1s" repeatCount="indefinite"/></circle>
  <circle cx="1150" cy="35" r="0.5" fill="#E0E6F1"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="5s" begin="0.9s" repeatCount="indefinite"/></circle>
  <circle cx="560" cy="165" r="0.6" fill="#E0E6F1"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" begin="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="920" cy="85" r="0.8" fill="#E0E6F1"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="6s" begin="5.2s" repeatCount="indefinite"/></circle>

  <!-- Header -->
  <text x="80" y="45" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#E0E6F1" letter-spacing="1">About</text>

  <!-- Body -->
  <text x="80" y="85" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#9BA3B8">Computer Science student at Southeastern Louisiana University, focused on</text>
  <text x="80" y="105" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#9BA3B8">backend systems, AI tooling, and interactive development in Unity.</text>

  <text x="80" y="140" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#9BA3B8">I build tools that work without a connection and automate the things that</text>
  <text x="80" y="160" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#9BA3B8">shouldn't need a human in the loop.</text>
</svg>
