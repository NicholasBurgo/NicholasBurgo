<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="180" viewBox="0 0 1200 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3F1ED"/>
      <stop offset="100%" stop-color="#EDEAE6"/>
    </linearGradient>
    <radialGradient id="n1" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#4A7BF7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4A7BF7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 0.4; } }
    @keyframes twinkle-slow { 0%, 100% { opacity: 0.02; } 50% { opacity: 0.35; } }
    @keyframes pulse { 0%, 100% { opacity: 0.05; r: 2; } 50% { opacity: 0.4; r: 3.5; } }
    @keyframes breathe { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    .s1 { animation: twinkle 3s ease-in-out infinite; }
    .s2 { animation: twinkle-slow 5s ease-in-out infinite; }
    .s3 { animation: twinkle 4s ease-in-out infinite; }
    .bright { animation: pulse 4s ease-in-out infinite; }
    .nb { animation: breathe 8s ease-in-out infinite; }
  </style>

  <rect width="1200" height="180" fill="url(#bg)"/>
  <rect class="nb" width="1200" height="180" fill="url(#n1)"/>
  <rect class="nb" width="1200" height="180" fill="url(#n2)" style="animation-delay:-4s"/>

  <circle cx="45" cy="25" r="1.2" fill="#5C6380" class="s1"/>
  <circle cx="312" cy="155" r="1.0" fill="#5C6380" class="s2" style="animation-delay:-2.8s"/>
  <circle cx="780" cy="20" r="1.4" fill="#5C6380" class="s3" style="animation-delay:-1.3s"/>
  <circle cx="1050" cy="140" r="2" fill="url(#glow)" class="bright" style="animation-delay:-3s"/>
  <circle cx="1150" cy="35" r="0.8" fill="#5C6380" class="s1" style="animation-delay:-0.9s"/>
  <circle cx="560" cy="165" r="1.0" fill="#5C6380" class="s2" style="animation-delay:-3.5s"/>
  <circle cx="920" cy="85" r="1.3" fill="#5C6380" class="s3" style="animation-delay:-5.2s"/>
  <circle cx="180" cy="90" r="2" fill="url(#glow)" class="bright" style="animation-delay:-1.5s"/>

  <text x="80" y="45" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" fill="#1A1D2B" letter-spacing="1">About</text>
  <text x="80" y="85" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="15" fill="#4A4E5C">Computer Science student at Southeastern Louisiana University, focused on</text>
  <text x="80" y="105" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="15" fill="#4A4E5C">backend systems, AI tooling, and interactive development in Unity.</text>
  <text x="80" y="140" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="15" fill="#4A4E5C">I build tools that work without a connection and automate the things that</text>
  <text x="80" y="160" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="15" fill="#4A4E5C">shouldn't need a human in the loop.</text>
</svg>
