<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3F0"/>
      <stop offset="100%" stop-color="#EDEAE6"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="35%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="65%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#4A7BF7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#4A7BF7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.35; }
    }
    @keyframes twinkle-soft {
      0%, 100% { opacity: 0.08; }
      50% { opacity: 0.25; }
    }
    @keyframes nebula-breathe {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    .star-a { animation: twinkle 4s ease-in-out infinite; }
    .star-b { animation: twinkle-soft 5s ease-in-out infinite; }
    .star-c { animation: twinkle 6s ease-in-out infinite; }
    .star-d { animation: twinkle-soft 7s ease-in-out infinite; }
    .nebula { animation: nebula-breathe 8s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Nebula glow -->
  <rect class="nebula" width="1200" height="300" fill="url(#nebula1)"/>
  <rect class="nebula" width="1200" height="300" fill="url(#nebula2)" style="animation-delay: -4s;"/>

  <!-- Stars (subtler on light bg) -->
  <circle cx="89" cy="42" r="1.2" fill="#5C6380" class="star-a"/>
  <circle cx="234" cy="78" r="0.8" fill="#5C6380" class="star-b" style="animation-delay: -1.2s;"/>
  <circle cx="156" cy="198" r="1.0" fill="#5C6380" class="star-c" style="animation-delay: -3.5s;"/>
  <circle cx="412" cy="31" r="0.6" fill="#5C6380" class="star-d" style="animation-delay: -0.8s;"/>
  <circle cx="543" cy="267" r="1.1" fill="#5C6380" class="star-a" style="animation-delay: -2.1s;"/>
  <circle cx="678" cy="52" r="0.9" fill="#5C6380" class="star-b" style="animation-delay: -4.3s;"/>
  <circle cx="721" cy="241" r="0.7" fill="#5C6380" class="star-c" style="animation-delay: -1.7s;"/>
  <circle cx="890" cy="89" r="1.3" fill="#5C6380" class="star-a" style="animation-delay: -5.2s;"/>
  <circle cx="945" cy="178" r="0.6" fill="#5C6380" class="star-d" style="animation-delay: -2.9s;"/>
  <circle cx="1034" cy="44" r="1.0" fill="#5C6380" class="star-b" style="animation-delay: -0.4s;"/>
  <circle cx="1112" cy="256" r="0.8" fill="#5C6380" class="star-c" style="animation-delay: -3.8s;"/>
  <circle cx="1156" cy="112" r="1.1" fill="#5C6380" class="star-a" style="animation-delay: -6.1s;"/>
  <circle cx="67" cy="134" r="0.7" fill="#5C6380" class="star-d" style="animation-delay: -1.5s;"/>
  <circle cx="320" cy="245" r="0.9" fill="#5C6380" class="star-b" style="animation-delay: -4.7s;"/>
  <circle cx="478" cy="112" r="0.5" fill="#5C6380" class="star-c" style="animation-delay: -2.3s;"/>
  <circle cx="812" cy="165" r="1.0" fill="#5C6380" class="star-a" style="animation-delay: -3.1s;"/>
  <circle cx="1078" cy="198" r="0.6" fill="#5C6380" class="star-d" style="animation-delay: -5.6s;"/>
  <circle cx="189" cy="267" r="0.8" fill="#5C6380" class="star-b" style="animation-delay: -0.9s;"/>
  <circle cx="600" cy="38" r="0.7" fill="#5C6380" class="star-c" style="animation-delay: -2.7s;"/>
  <circle cx="367" cy="155" r="0.5" fill="#5C6380" class="star-d" style="animation-delay: -4.1s;"/>

  <!-- Name -->
  <text x="600" y="130" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="48" font-weight="300" fill="#1A1D2B" letter-spacing="6">Nicholas Burgo</text>

  <!-- Subtitle -->
  <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#5C6380" letter-spacing="3">COMPUTER SCIENCE  //  BACKEND  +  AI TOOLING  +  UNITY</text>
</svg>
