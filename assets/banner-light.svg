      <stop offset="100%" stop-color="#EDEAE6"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="35%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.07"/>
