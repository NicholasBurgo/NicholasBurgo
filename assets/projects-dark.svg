<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111425"/>
      <stop offset="100%" stop-color="#0B0D17"/>
    </linearGradient>
    <radialGradient id="n1" cx="60%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n2" cx="25%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#4A7BF7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4A7BF7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n3" cx="85%" cy="80%" r="25%">
      <stop offset="0%" stop-color="#9B4FDE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9B4FDE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#n1)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="10s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="340" fill="url(#n2)">
    <animate attributeName="opacity" values="1;0.8;1" dur="8s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="340" fill="url(#n3)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="12s" begin="5s" repeatCount="indefinite"/>
  </rect>

  <circle cx="78" cy="30" r="0.7" fill="#E0E6F1"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="4s" begin="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="340" cy="310" r="0.9" fill="#E0E6F1"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" begin="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="15" r="0.6" fill="#E0E6F1"><animate attributeName="opacity" values="0.1;0.75;0.1" dur="6s" begin="0.7s" repeatCount="indefinite"/></circle>
  <circle cx="980" cy="280" r="0.8" fill="#E0E6F1"><animate attributeName="opacity" values="0.2;0.65;0.2" dur="7s" begin="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="1130" cy="60" r="0.5" fill="#E0E6F1"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="4s" begin="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="170" r="0.7" fill="#E0E6F1"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="5s" begin="5.6s" repeatCount="indefinite"/></circle>
  <circle cx="1080" cy="190" r="0.6" fill="#E0E6F1"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="6s" begin="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="325" r="0.8" fill="#E0E6F1"><animate attributeName="opacity" values="0.15;0.75;0.15" dur="4s" begin="3.7s" repeatCount="indefinite"/></circle>

  <!-- Header -->
  <text x="80" y="45" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#E0E6F1" letter-spacing="1">Projects</text>

  <!-- Project 1 -->
  <text x="80" y="90" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#E0E6F1">SiteInsite</text>
  <text x="80" y="112" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#9BA3B8">Full-stack intelligence platform that crawls websites and generates SEO,</text>
  <text x="80" y="130" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#9BA3B8">performance, and competitor insight reports.</text>
  <text x="80" y="150" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#5C6380">Python  ·  FastAPI  ·  React  ·  aiohttp  ·  Playwright</text>

  <!-- Project 2 -->
  <text x="80" y="195" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#E0E6F1">SiteExtractor</text>
  <text x="80" y="217" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#9BA3B8">Extract, deduplicate, and export web content with real-time progress</text>
  <text x="80" y="235" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#9BA3B8">tracking and multi-format support.</text>
  <text x="80" y="255" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" fill="#5C6380">Python  ·  FastAPI  ·  React  ·  SimHash</text>

  <!-- Project 3 -->
  <text x="80" y="300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#E0E6F1">AI Ops Playbook</text>
  <text x="80" y="322" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#9BA3B8">Version-controlled library of production-grade AI prompts, workflows, and operational standards.</text>
</svg>
