<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0D17"/>
      <stop offset="100%" stop-color="#151929"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="35%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="65%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#4A7BF7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4A7BF7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Nebula glow with breathing animation -->
  <rect width="1200" height="300" fill="url(#nebula1)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="8s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="300" fill="url(#nebula2)">
    <animate attributeName="opacity" values="1;0.85;1" dur="8s" begin="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Stars with staggered twinkling -->
