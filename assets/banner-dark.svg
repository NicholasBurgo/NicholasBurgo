<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0D17"/>
      <stop offset="100%" stop-color="#151929"/>
    </linearGradient>
    <radialGradient id="n1" cx="30%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n2" cx="70%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#4A7BF7" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4A7BF7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="n3" cx="55%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#9B4FDE" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9B4FDE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes twinkle-a { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.9; } }
    @keyframes twinkle-b { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
    @keyframes twinkle-c { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.85; } }
    @keyframes twinkle-d { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.6; } }
    @keyframes breathe { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    .sa { animation: twinkle-a 4s ease-in-out infinite; }
    .sb { animation: twinkle-b 5s ease-in-out infinite; }
    .sc { animation: twinkle-c 6s ease-in-out infinite; }
    .sd { animation: twinkle-d 7s ease-in-out infinite; }
    .nb { animation: breathe 8s ease-in-out infinite; }
  </style>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect class="nb" width="1200" height="300" fill="url(#n1)"/>
  <rect class="nb" width="1200" height="300" fill="url(#n2)" style="animation-delay:-4s"/>
  <rect class="nb" width="1200" height="300" fill="url(#n3)" style="animation-delay:-2s"/>

  <circle cx="89" cy="42" r="1.2" fill="#E0E6F1" class="sa"/>
